<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChainRent</title>
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Material Symbols Outlined -->
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    rel="stylesheet" />

  <!-- Pre-mount theme application script to prevent flickers -->
  <script>
    (function () {
      try {
        const savedTheme = localStorage.getItem('chainrent_theme');
        const theme = savedTheme ? JSON.parse(savedTheme) : null;
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      } catch (e) {
        console.error('Failed to parse theme from localStorage', e);
      }
    })();
  </script>
</head>

<body class="bg-background text-on-background selection:bg-primary-container selection:text-on-primary-container">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
